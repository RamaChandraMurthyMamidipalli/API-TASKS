<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Store Products</title>
</head>
<body>

    <h2>Product Search</h2>

    <input
        type="text" id="productInput" min="1" max="20">

    <button onclick="getProduct()">Search</button>
    <br><br>
    <img id="productImg" width="200">
    <h3 id="productTitle"></h3>
    <h4 id="productPrice"></h4>
    <script>

        async function getProduct() {

            try {

                const productId =
                    document.getElementById("productInput").value;

                if (productId === "") {
                    alert("Please enter a Product ID");
                    return;
                }

                const response = await fetch(
                    `https://fakestoreapi.com/products/${productId}`
                );

                if (!response.ok) {
                    throw new Error("Failed to fetch product");
                }
                const data = await response.json();
                document.getElementById("productImg").src =data.image;
                document.getElementById("productTitle").textContent = data.title;
                document.getElementById("productPrice").textContent ="Price: $" + data.price;
            } catch (error) {
                console.log(error);
                alert("Error fetching product data");
            }
        }

    </script>

</body>
</html>
